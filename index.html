<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>4more — Coming Soon</title>
<meta name="description" content="4more is coming back — better and improved. Stay tuned." />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0ea5e9 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }
  .container { max-width: 720px; animation: fadeIn 1.2s ease-out; }
  .logo {
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
    background: linear-gradient(90deg, #fff, #bae6fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 600; margin-bottom: 1rem; line-height: 1.2; }
  p { font-size: clamp(1rem, 2vw, 1.25rem); opacity: 0.85; margin-bottom: 2.5rem; line-height: 1.6; }
  .badge {
    display: inline-block; padding: 0.5rem 1.25rem;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 999px; font-size: 0.875rem;
    letter-spacing: 0.05em; text-transform: uppercase;
    backdrop-filter: blur(10px);
  }
  .pulse {
    display: inline-block; width: 8px; height: 8px;
    background: #10b981; border-radius: 50%;
    margin-right: 0.5rem; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% {opacity:1;transform:scale(1);} 50% {opacity:.5;transform:scale(1.2);} }
  @keyframes fadeIn { from {opacity:0;transform:translateY(20px);} to {opacity:1;transform:translateY(0);} }
  footer { position: fixed; bottom: 1.5rem; left: 0; right: 0; text-align: center; font-size: 0.875rem; opacity: 0.6; }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">4more</div>
    <h1>Coming Soon — Better &amp; Improved</h1>
    <p>We're building something great. A brand-new 4more experience is on its way.</p>
    <div class="badge"><span class="pulse"></span>Relaunching soon</div>
  </div>
  <footer>&copy; 4more.ca</footer>
</body>
</html>
